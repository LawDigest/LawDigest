name: Deploy Web (dev)

on:
  push:
    branches: [main]
    paths:
      - 'services/web/**'
      - 'deploy/deploy-test-web.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-web-changes:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-parents=0 "$head" | tail -n 1)"
          fi

          if git diff --name-only "$base" "$head" -- services/web deploy/deploy-test-web.sh | grep -q .; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: detect-web-changes
    if: needs.detect-web-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/web/package-lock.json

      - name: Install web dependencies
        working-directory: services/web
        run: npm ci

      - name: Verify web build
        working-directory: services/web
        env:
          NEXT_PUBLIC_URL: https://api.lawdigest.net/
          NEXT_PUBLIC_IMAGE_URL: https://api.lawdigest.net
          NEXT_PUBLIC_HOSTNAME: api.lawdigest.net
          NEXT_PUBLIC_DOMAIN: https://dev.lawdigest.net
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            REPO_ROOT=/home/ubuntu/project/Lawdigest
            DEPLOY_ROOT="$REPO_ROOT/.worktrees/dev-web-release"

            if [ ! -d "$DEPLOY_ROOT/.git" ] && [ ! -f "$DEPLOY_ROOT/.git" ]; then
              git -C "$REPO_ROOT" fetch origin main
              git -C "$REPO_ROOT" worktree add --detach "$DEPLOY_ROOT" origin/main
            fi

            git -C "$DEPLOY_ROOT" fetch origin main
            git -C "$DEPLOY_ROOT" reset --hard origin/main

            cd "$REPO_ROOT"
            PORT=3010 \
            PM2_NAME=lawdigest-web \
            NEXT_PUBLIC_DOMAIN=https://dev.lawdigest.net \
            NEXT_PUBLIC_URL=https://api.lawdigest.net/ \
            NEXT_PUBLIC_IMAGE_URL=https://api.lawdigest.net \
            NEXT_PUBLIC_HOSTNAME=api.lawdigest.net \
            ./deploy/deploy-test-web.sh "$DEPLOY_ROOT"
