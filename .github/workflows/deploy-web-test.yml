name: Deploy Web (test)

on:
  push:
    branches: [dev]
    paths:
      - 'services/web/**'
      - 'deploy/deploy-test-web.sh'
      - 'deploy/deploy-web-release.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-web-changes:
    runs-on: ubuntu-latest
    outputs:
      web_changed: ${{ steps.filter.outputs.web_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-parents=0 "$head" | tail -n 1)"
          fi

          if git diff --name-only "$base" "$head" -- services/web deploy/deploy-test-web.sh deploy/deploy-web-release.sh | grep -q .; then
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "web_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-web-changes
    if: needs.detect-web-changes.outputs.web_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            REPO_ROOT=/home/ubuntu/project/Lawdigest
            DEPLOY_ROOT="$REPO_ROOT/.worktrees/test-web-release"

            if [ ! -d "$DEPLOY_ROOT/.git" ] && [ ! -f "$DEPLOY_ROOT/.git" ]; then
              git -C "$REPO_ROOT" fetch origin dev
              git -C "$REPO_ROOT" worktree add --detach "$DEPLOY_ROOT" origin/dev
            fi

            git -C "$DEPLOY_ROOT" fetch origin dev
            git -C "$DEPLOY_ROOT" reset --hard origin/dev

            cd "$REPO_ROOT"
            WEB_PORT=3020 \
            PM2_NAME=lawdigest-web-test \
            NEXT_PUBLIC_DOMAIN=https://test.lawdigest.kr \
            ./deploy/deploy-test-web.sh "$DEPLOY_ROOT"
