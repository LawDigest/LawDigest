name: Deploy Backend (dev)

on:
  push:
    branches: [develop]
    paths:
      - 'services/backend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17 and build cache
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Make gradlew executable
        run: chmod +x services/backend/gradlew

      - name: Execute Gradle build
        working-directory: services/backend
        run: ./gradlew build -x test

      - name: Deploy to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_ROOT=/home/ubuntu/project/Lawdigest
            DEPLOY_ROOT="$REPO_ROOT/.worktrees/develop-backend-release"

            if [ ! -d "$DEPLOY_ROOT/.git" ] && [ ! -f "$DEPLOY_ROOT/.git" ]; then
              git -C "$REPO_ROOT" fetch origin develop
              git -C "$REPO_ROOT" worktree add --detach "$DEPLOY_ROOT" origin/develop
            fi

            git -C "$DEPLOY_ROOT" fetch origin develop
            git -C "$DEPLOY_ROOT" reset --hard origin/develop

            cd "$REPO_ROOT"
            PORT=808 \
            CONTAINER_NAME=lawmaking-test-back \
            IMAGE_NAME=lawmaking-test-back \
            DOCKER_NETWORK=law_test_network \
            ACTIVE=test \
            ./deploy/deploy-test-backend.sh "$DEPLOY_ROOT"
