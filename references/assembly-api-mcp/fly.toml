# fly.toml app configuration file generated for assembly-api-mcp on 2026-04-07T05:16:39+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'assembly-api-mcp'
primary_region = 'nrt'

[build]

[env]
  ASSEMBLY_API_KEY = 'sample'
  MCP_PORT = '3000'
  MCP_PROFILE = 'lite'
  MCP_TRANSPORT = 'http'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
