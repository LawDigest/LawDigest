server.port=8080

# in-memory datasource for smoke tests
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:lawdigest-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.strategy=org.hibernate.cfg.ImprovedNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.data.redis.host=localhost
spring.data.redis.password=
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

app.auth.token-secret=test-token-secret-for-demo-application-tests
app.auth.access-token-expiry=30
app.auth.refresh-token-expiry=10080
app.auth.cookie-domain=localhost
app.oauth2.client-redirect-uri=http://localhost:3000/callback
app.auth.kakao-app-admin-key=test-kakao-admin-key
app.auth.kakao-app-client-id=test-kakao-client-id
app.auth.kakao-app-client-secret=test-kakao-client-secret
app.auth.naver-app-client-id=test-naver-client-id
app.auth.naver-app-client-secret=test-naver-client-secret
app.auth.google-app-client-id=test-google-client-id
app.auth.google-app-client-secret=test-google-client-secret

#Kakao
spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-client-secret
spring.security.oauth2.client.registration.kakao.redirect-uri=https://test.api.lawdigest.kr/v1/login/oauth2/code/kakao

#Naver
spring.security.oauth2.client.registration.naver.client-id=test-naver-client-id
spring.security.oauth2.client.registration.naver.client-secret=test-naver-client-secret
spring.security.oauth2.client.registration.naver.redirect-uri=https://test.api.lawdigest.kr/v1/login/oauth2/code/naver

#Google
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=https://test.api.lawdigest.kr/v1/login/oauth2/code/google
